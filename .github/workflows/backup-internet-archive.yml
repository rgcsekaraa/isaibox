name: Backup Internet Archive

on:
  schedule:
    - cron: "15 2 * * *"
  workflow_run:
    workflows: ["Refresh DuckDB Library"]
    types: [completed]
  workflow_dispatch:
    inputs:
      publish_ref:
        description: "Git ref to read the app manifest from"
        required: false
        default: "main"
      item:
        description: "Internet Archive item identifier"
        required: false
        default: "isaibox-public-library"
      include_audio:
        description: "Upload cached or newly hydrated audio files"
        required: false
        default: "true"
      download_missing_audio:
        description: "Download missing audio from the library DB before uploading"
        required: false
        default: "true"
      allow_128_fallback:
        description: "Use 128kbps when a 320kbps link is not available"
        required: false
        default: "true"
      audio_limit:
        description: "Maximum new audio files to upload in this run"
        required: false
        default: "25"
      audio_attempt_limit:
        description: "Maximum upstream download attempts in this run"
        required: false
        default: "25"

permissions:
  contents: read

concurrency:
  group: internet-archive-backup
  cancel-in-progress: false

jobs:
  backup:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.publish_ref || 'main' }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install backup dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r packages/isaibox-local/requirements-local.txt internetarchive cryptography

      - name: Download current published DuckDB
        shell: bash
        run: |
          mkdir -p packages/isaibox-local/app/data packages/isaibox-local/app/.cache/audio
          DOWNLOAD_URL="$(python - <<'PY'
          import json
          from pathlib import Path
          manifest = json.loads(Path("packages/isaibox-local/app/data/library-manifest.json").read_text())
          print(manifest["download_url"])
          PY
          )"
          curl -fL --retry 3 --retry-delay 20 \
            -o packages/isaibox-local/app/data/masstamilan.duckdb \
            "${DOWNLOAD_URL}"

      - name: Backup sanitized library to Internet Archive
        shell: bash
        env:
          IA_ACCESS_KEY: ${{ secrets.IA_ACCESS_KEY }}
          IA_SECRET_KEY: ${{ secrets.IA_SECRET_KEY }}
          IA_ENCRYPTION_PASSPHRASE: ${{ secrets.IA_ENCRYPTION_PASSPHRASE }}
          IA_ITEM: ${{ github.event.inputs.item || 'isaibox-public-library' }}
          IA_AUDIO_LIMIT: ${{ github.event.inputs.audio_limit || '25' }}
          IA_AUDIO_ATTEMPT_LIMIT: ${{ github.event.inputs.audio_attempt_limit || '25' }}
          IA_DOWNLOAD_DELAY: "8"
          IA_ALLOW_128_FALLBACK: ${{ github.event.inputs.allow_128_fallback || 'true' }}
          INCLUDE_AUDIO: ${{ github.event.inputs.include_audio || 'true' }}
          DOWNLOAD_MISSING_AUDIO: ${{ github.event.inputs.download_missing_audio || 'true' }}
        run: |
          if [ -z "${IA_ACCESS_KEY}" ] || [ -z "${IA_SECRET_KEY}" ]; then
            echo "IA_ACCESS_KEY and IA_SECRET_KEY secrets are required."
            exit 1
          fi
          if [ -z "${IA_ENCRYPTION_PASSPHRASE}" ]; then
            echo "IA_ENCRYPTION_PASSPHRASE secret is required."
            exit 1
          fi

          AUDIO_FLAGS=""
          if [ "${INCLUDE_AUDIO}" = "true" ]; then
            AUDIO_FLAGS="${AUDIO_FLAGS} --include-audio"
          fi
          if [ "${DOWNLOAD_MISSING_AUDIO}" = "true" ]; then
            AUDIO_FLAGS="${AUDIO_FLAGS} --download-missing-audio"
          fi
          if [ "${IA_ALLOW_128_FALLBACK}" != "true" ]; then
            AUDIO_FLAGS="${AUDIO_FLAGS} --strict-320-only"
          fi

          python scripts/backup_internet_archive.py \
            --item "${IA_ITEM}" \
            --audio-limit "${IA_AUDIO_LIMIT}" \
            --audio-attempt-limit "${IA_AUDIO_ATTEMPT_LIMIT}" \
            ${AUDIO_FLAGS}

      - name: Upload backup plan artifact
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: internet-archive-upload-plan-${{ github.run_id }}
          path: .ia-backup/upload-plan.csv
          if-no-files-found: ignore
          retention-days: 14

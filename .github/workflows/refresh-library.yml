name: Refresh DuckDB Library

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
    inputs:
      scan_mode:
        description: "Scrape mode passed to run_standalone.py"
        required: false
        default: "all"
      full_scan:
        description: "Run in full scan mode"
        required: false
        default: "true"
      delay:
        description: "Delay between page fetches"
        required: false
        default: "1.3"
      publish_ref:
        description: "Git ref used in raw download URLs and push target"
        required: false
        default: "main"
permissions:
  contents: write
  actions: read

concurrency:
  group: refresh-library
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.publish_ref || 'main' }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install scraper dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install duckdb requests beautifulsoup4 lxml tenacity cloudscraper

      - name: Ensure data directories exist
        run: mkdir -p data exports packages/isaibox-local/app/data

      - name: Run scraper
        env:
          INPUT_SCAN_MODE: ${{ github.event.inputs.scan_mode || 'all' }}
          INPUT_FULL_SCAN: ${{ github.event.inputs.full_scan || 'true' }}
          INPUT_DELAY: ${{ github.event.inputs.delay || '1.3' }}
        run: |
          if [ "${INPUT_FULL_SCAN}" = "true" ]; then
            FULL_FLAG="--full"
          else
            FULL_FLAG=""
          fi
          python run_standalone.py --mode "${INPUT_SCAN_MODE}" --delay "${INPUT_DELAY}" ${FULL_FLAG}

      - name: Publish packaged DuckDB and manifest
        env:
          INPUT_PUBLISH_REF: ${{ github.event.inputs.publish_ref || 'main' }}
        run: |
          VERSION="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          python scripts/publish_library.py \
            --db-path data/masstamilan.duckdb \
            --output-db packages/isaibox-local/app/data/masstamilan.duckdb \
            --manifest packages/isaibox-local/app/data/library-manifest.json \
            --repo "${GITHUB_REPOSITORY}" \
            --ref "${INPUT_PUBLISH_REF}" \
            --version "${VERSION}"

      - name: Detect repository changes
        id: changes
        run: |
          if git diff --quiet -- packages/isaibox-local/app/data/masstamilan.duckdb packages/isaibox-local/app/data/library-manifest.json; then
            echo "changed=false" >> "${GITHUB_OUTPUT}"
          else
            echo "changed=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Commit refreshed library
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/isaibox-local/app/data/masstamilan.duckdb packages/isaibox-local/app/data/library-manifest.json
          git commit -m "chore(data): refresh DuckDB library"

      - name: Push refreshed library
        if: steps.changes.outputs.changed == 'true'
        run: git push origin HEAD:${{ github.event.inputs.publish_ref || 'main' }}

      - name: Summarize
        run: |
          if [ "${{ steps.changes.outputs.changed }}" = "true" ]; then
            echo "DuckDB snapshot changed and was pushed."
          else
            echo "DuckDB snapshot unchanged; nothing pushed."
          fi

name: Deploy Hugging Face Space

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-huggingface-space
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Prepare Space bundle
        shell: bash
        run: |
          mkdir -p /tmp/isaibox-space
          rsync -a --delete \
            --exclude '.env' \
            --exclude 'Dockerfile.backend' \
            --exclude 'Dockerfile.frontend' \
            --exclude 'docker-compose.yml' \
            --exclude 'nginx.conf' \
            --exclude 'app/data/*.duckdb' \
            --exclude 'app/data/*.download' \
            --exclude 'app/data/*.previous' \
            packages/isaibox-local/ /tmp/isaibox-space/
          rm -f /tmp/isaibox-space/app/data/*.duckdb /tmp/isaibox-space/app/data/*.download /tmp/isaibox-space/app/data/*.previous
          if find /tmp/isaibox-space/app/data -maxdepth 1 -type f \( -name '*.duckdb' -o -name '*.download' -o -name '*.previous' \) | grep -q .; then
            echo "Space bundle must not include generated database artifacts"
            exit 1
          fi
          mv /tmp/isaibox-space/Dockerfile.space /tmp/isaibox-space/Dockerfile
          mv /tmp/isaibox-space/README.space.md /tmp/isaibox-space/README.md

      - name: Install Hugging Face CLI
        run: python -m pip install --upgrade huggingface_hub

      - name: Upload Space bundle
        shell: bash
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          test -n "${HF_TOKEN}" || { echo "HF_TOKEN GitHub secret is missing"; exit 1; }
          hf upload chanrg/isaibox /tmp/isaibox-space . \
            --repo-type space \
            --delete "*" \
            --commit-message "Deploy isaibox local app" \
            --token "${HF_TOKEN}"

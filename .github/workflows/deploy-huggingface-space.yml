name: Deploy Hugging Face Space

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-huggingface-space
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare Space bundle
        shell: bash
        run: |
          mkdir -p /tmp/isaibox-space
          rsync -a --delete \
            --exclude '.env' \
            --exclude 'Dockerfile.backend' \
            --exclude 'Dockerfile.frontend' \
            --exclude 'docker-compose.yml' \
            --exclude 'nginx.conf' \
            --exclude 'app/data/*.duckdb' \
            --exclude 'app/data/*.download' \
            --exclude 'app/data/*.previous' \
            packages/isaibox-local/ /tmp/isaibox-space/
          mv /tmp/isaibox-space/Dockerfile.space /tmp/isaibox-space/Dockerfile
          mv /tmp/isaibox-space/README.space.md /tmp/isaibox-space/README.md

      - name: Push Space bundle
        shell: bash
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          cd /tmp/isaibox-space
          git init
          git checkout -b main
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Deploy isaibox local app"
          git push --force "https://chanrg:${HF_TOKEN}@huggingface.co/spaces/chanrg/isaibox" main
